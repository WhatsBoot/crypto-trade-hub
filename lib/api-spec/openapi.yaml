openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: DEX Exchange API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: balances
    description: Crypto balances
  - name: withdrawals
    description: Withdrawal requests
  - name: trades
    description: Trading operations
  - name: swaps
    description: Token swaps
  - name: markets
    description: Market data
  - name: admin
    description: Admin operations
  - name: transactions
    description: Transaction history

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /balances:
    get:
      operationId: getBalances
      tags: [balances]
      summary: Get current user balances
      responses:
        "200":
          description: Balances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Balance"

  /balances/portfolio:
    get:
      operationId: getPortfolio
      tags: [balances]
      summary: Get portfolio summary with USD values
      responses:
        "200":
          description: Portfolio summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Portfolio"

  /markets:
    get:
      operationId: getMarkets
      tags: [markets]
      summary: Get all market prices
      responses:
        "200":
          description: Market prices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Market"

  /markets/{symbol}:
    get:
      operationId: getMarket
      tags: [markets]
      summary: Get market data for a specific coin
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Market data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Market"

  /trades:
    get:
      operationId: getTrades
      tags: [trades]
      summary: Get user trade history
      responses:
        "200":
          description: Trades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trade"
    post:
      operationId: createTrade
      tags: [trades]
      summary: Place a trade (buy/sell)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradeInput"
      responses:
        "201":
          description: Trade executed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"

  /swaps:
    post:
      operationId: createSwap
      tags: [swaps]
      summary: Swap one token for another
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwapInput"
      responses:
        "201":
          description: Swap executed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Swap"

  /swaps/quote:
    post:
      operationId: getSwapQuote
      tags: [swaps]
      summary: Get a swap quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwapQuoteInput"
      responses:
        "200":
          description: Swap quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwapQuote"

  /withdrawals:
    get:
      operationId: getWithdrawals
      tags: [withdrawals]
      summary: Get user withdrawal requests
      responses:
        "200":
          description: Withdrawals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Withdrawal"
    post:
      operationId: createWithdrawal
      tags: [withdrawals]
      summary: Request a withdrawal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalInput"
      responses:
        "201":
          description: Withdrawal requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"
        "400":
          description: Insufficient balance or threshold not met

  /withdrawals/check:
    post:
      operationId: checkWithdrawalEligibility
      tags: [withdrawals]
      summary: Check if user can withdraw and get required USDT amount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalCheckInput"
      responses:
        "200":
          description: Eligibility check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalEligibility"

  /transactions:
    get:
      operationId: getTransactions
      tags: [transactions]
      summary: Get transaction history
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /admin/users:
    get:
      operationId: adminGetUsers
      tags: [admin]
      summary: Get all users
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{userId}/balance:
    patch:
      operationId: adminUpdateBalance
      tags: [admin]
      summary: Add or update crypto balance for a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BalanceUpdate"
      responses:
        "200":
          description: Balance updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Balance"

  /admin/withdrawals:
    get:
      operationId: adminGetWithdrawals
      tags: [admin]
      summary: Get all withdrawal requests
      responses:
        "200":
          description: All withdrawals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Withdrawal"

  /admin/withdrawals/{id}:
    patch:
      operationId: adminUpdateWithdrawal
      tags: [admin]
      summary: Approve or reject a withdrawal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  /admin/settings:
    get:
      operationId: adminGetSettings
      tags: [admin]
      summary: Get admin settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettings"
    patch:
      operationId: adminUpdateSettings
      tags: [admin]
      summary: Update admin settings (threshold %, wallet address, network, withdrawal message)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettings"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Get platform stats
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    RegisterInput:
      type: object
      required: [email, password, username]
      properties:
        email:
          type: string
        password:
          type: string
        username:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, email, username, role, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        username:
          type: string
        role:
          type: string
          enum: [user, admin]
        createdAt:
          type: string

    AdminUser:
      type: object
      required: [id, email, username, role, createdAt, totalBalanceUsdt]
      properties:
        id:
          type: integer
        email:
          type: string
        username:
          type: string
        role:
          type: string
        createdAt:
          type: string
        totalBalanceUsdt:
          type: number
        balances:
          type: array
          items:
            $ref: "#/components/schemas/Balance"

    Balance:
      type: object
      required: [id, userId, currency, amount, updatedAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        currency:
          type: string
        amount:
          type: number
        usdValue:
          type: ["number", "null"]
        updatedAt:
          type: string

    BalanceUpdate:
      type: object
      required: [currency, amount]
      properties:
        currency:
          type: string
        amount:
          type: number
        operation:
          type: string
          enum: [set, add, subtract]

    Portfolio:
      type: object
      required: [totalUsdValue, balances, change24h]
      properties:
        totalUsdValue:
          type: number
        change24h:
          type: number
        balances:
          type: array
          items:
            $ref: "#/components/schemas/Balance"

    Market:
      type: object
      required: [symbol, name, price, change24h, volume24h, high24h, low24h]
      properties:
        symbol:
          type: string
        name:
          type: string
        price:
          type: number
        change24h:
          type: number
        volume24h:
          type: number
        high24h:
          type: number
        low24h:
          type: number
        marketCap:
          type: ["number", "null"]

    TradeInput:
      type: object
      required: [symbol, side, amount]
      properties:
        symbol:
          type: string
        side:
          type: string
          enum: [buy, sell]
        amount:
          type: number
        price:
          type: ["number", "null"]

    Trade:
      type: object
      required: [id, userId, symbol, side, amount, price, total, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        symbol:
          type: string
        side:
          type: string
        amount:
          type: number
        price:
          type: number
        total:
          type: number
        status:
          type: string
          enum: [pending, filled, cancelled]
        createdAt:
          type: string

    SwapQuoteInput:
      type: object
      required: [fromCurrency, toCurrency, amount]
      properties:
        fromCurrency:
          type: string
        toCurrency:
          type: string
        amount:
          type: number

    SwapQuote:
      type: object
      required: [fromCurrency, toCurrency, fromAmount, toAmount, rate, fee]
      properties:
        fromCurrency:
          type: string
        toCurrency:
          type: string
        fromAmount:
          type: number
        toAmount:
          type: number
        rate:
          type: number
        fee:
          type: number
        feePercent:
          type: number

    SwapInput:
      type: object
      required: [fromCurrency, toCurrency, amount]
      properties:
        fromCurrency:
          type: string
        toCurrency:
          type: string
        amount:
          type: number

    Swap:
      type: object
      required: [id, userId, fromCurrency, toCurrency, fromAmount, toAmount, rate, fee, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        fromCurrency:
          type: string
        toCurrency:
          type: string
        fromAmount:
          type: number
        toAmount:
          type: number
        rate:
          type: number
        fee:
          type: number
        createdAt:
          type: string

    WithdrawalCheckInput:
      type: object
      required: [currency, amount]
      properties:
        currency:
          type: string
        amount:
          type: number

    WithdrawalEligibility:
      type: object
      required: [eligible, requiredUsdt, currentUsdt, thresholdPercent, message, walletAddress, network]
      properties:
        eligible:
          type: boolean
        requiredUsdt:
          type: number
        currentUsdt:
          type: number
        thresholdPercent:
          type: number
        message:
          type: string
        walletAddress:
          type: string
        network:
          type: string

    WithdrawalInput:
      type: object
      required: [currency, amount, toAddress, network]
      properties:
        currency:
          type: string
        amount:
          type: number
        toAddress:
          type: string
        network:
          type: string

    Withdrawal:
      type: object
      required: [id, userId, currency, amount, toAddress, network, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        username:
          type: ["string", "null"]
        currency:
          type: string
        amount:
          type: number
        toAddress:
          type: string
        network:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        txHash:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    WithdrawalStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [approved, rejected]
        txHash:
          type: ["string", "null"]

    Transaction:
      type: object
      required: [id, userId, type, currency, amount, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
          enum: [deposit, withdrawal, trade, swap]
        currency:
          type: string
        amount:
          type: number
        status:
          type: string
        description:
          type: ["string", "null"]
        createdAt:
          type: string

    AdminSettings:
      type: object
      required: [id, withdrawalThresholdPercent, withdrawalMessage, walletAddress, network, updatedAt]
      properties:
        id:
          type: integer
        withdrawalThresholdPercent:
          type: number
        withdrawalMessage:
          type: string
        walletAddress:
          type: string
        network:
          type: string
        updatedAt:
          type: string

    AdminSettingsUpdate:
      type: object
      properties:
        withdrawalThresholdPercent:
          type: ["number", "null"]
        withdrawalMessage:
          type: ["string", "null"]
        walletAddress:
          type: ["string", "null"]
        network:
          type: ["string", "null"]

    AdminStats:
      type: object
      required: [totalUsers, totalVolume, pendingWithdrawals, totalDeposited]
      properties:
        totalUsers:
          type: integer
        totalVolume:
          type: number
        pendingWithdrawals:
          type: integer
        totalDeposited:
          type: number
        totalTrades:
          type: integer
        totalSwaps:
          type: integer
