kind = "web"
previewPath = "/"
title = "DEX Exchange"
version = "1.0.0"
id = "artifacts/dex-exchange"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24350

[services.development]
run = "pnpm --filter @workspace/dex-exchange run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dex-exchange", "run", "build" ]
publicDir = "artifacts/dex-exchange/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24350"
BASE_PATH = "/"
